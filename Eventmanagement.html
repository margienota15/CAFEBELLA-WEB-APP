<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Domine', serif;
}

body {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/******************************** SIDEBAR ********************************/
.sidebar {
  width: 270px;
  height: 100vh;
  background: 
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url('IMAGES/webapppic.jpg'); 
  background-size: cover;      
  background-position: center;   
  background-repeat: no-repeat;
  display: flex;
  flex-direction: column;
  color: white;
  padding: 20px;
  position: fixed;
  left: 0;
  top: 0;
  transition: transform 0.3s ease;
  z-index: 100;
}

.sidebar.hide {
  transform: translateX(-100%);
}

.sidebar-overlay {
  position: absolute;
  top: 150px;  
  left: 15px;
  right: 15px;
  bottom: 85px;
  background: rgba(201, 247, 255, 0.5);
  z-index: 0;
}

/******************************** MENU BUTTON ********************************/
.menu {
  position: relative;
  margin-top: 20px;
  padding-bottom: 15px;
  border-bottom: 2px solid white;
  z-index: 1;
}
.menu button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.8);
  cursor: pointer;
  text-align: left;
  font-weight: bold;
  font-size: 15px;      
  font-weight: 600;      
  letter-spacing: 0.3px; 
  color: #2b2b2b;       
  padding-left: 40px; 
  display: flex;
  align-items: center;
  gap: 10px;
  line-height: 1;
  transition: all 0.3s ease;
}
.menu button:hover {
  background: #2e7d32; 
  color: white;
}
.menu button:hover img.icon {
  filter: brightness(0) invert(1);
}
.menu button img.icon {
  width: 25px;
  height: 25px;
  object-fit: contain;
  display: block; 
}
#menu-btn {
  font-size: 22px;
  background: #114500;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-right: 15px;
}

/******************************** MAIN ********************************/
.main {
  flex: 1;
  margin-left: 270px;
  transition: margin-left 0.3s ease;

  display: flex;
  flex-direction: column;
}

.main.full {
  margin-left: 0;
}

/******************************** TOP BAR ********************************/
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #e9e9e9;
  padding: 15px 25px;
}

.left-section {
  display: flex;
  align-items: center;
  gap: 15px;
}

/******************************** SEARCH BAR ********************************/
.search-container {
  display: flex;
  align-items: center;
  background: #dcdcdc;
  padding: 8px 15px;
  border-radius: 25px;
  width: 350px;
}

.search-container span {
  margin-right: 10px;
  font-size: 16px;
}

.search-container input {
  border: none;
  background: transparent;
  outline: none;
  width: 100%;
}

/******************************** ADMIN ********************************/
.admin {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  position: relative;
  background: white;
  padding: 8px 15px;
  border-radius: 50px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.admin:hover {
  background: #f1f1f1;
}

.admin img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid #2e7d32;
  object-fit: cover;
}

.admin-info {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.admin-name {
  font-size: 14px;
  font-weight: 600;
  color: #1b5e20;
}

.admin-role {
  font-size: 11px;
  color: gray;
}

.arrow {
  font-size: 12px;
  color: #555;
}

.dropdown {
  display: none;
  position: absolute;
  top: 55px;
  right: 0;
  background: white;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  overflow: hidden;
  z-index: 100;
}

.dropdown button {
  width: 160px;
  padding: 12px;
  border: none;
  background: white;
  text-align: left;
  cursor: pointer;
  font-size: 14px;
}

.dropdown button:hover {
  background: #2e7d32;
  color: white;
}

.admin-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-bottom: 10px;      
  border-bottom: 2px solid white; 
  margin-top: 60px;
}

.admin-header h2 {
  margin: 0; 
  font-size: 22px;
}

.admin-header img {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #2e7d32;
}

/******************************** NAVBAR ********************************/
.title-container {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-left: 3px; /* same alignment sa toggle sidebar */
  margin-left: 0;
  padding-top: 9px;
}

.title-container h1 {
  font-size: 28px;
  margin-bottom: 10px;
  color: #114500;
}

.title-container p {
  font-size: 16px;
  color: #555;
}

.content-wrapper {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px 30px; /* add some padding so content is visible */
  z-index: 10; /* bring content above .title-green */
}

/******************************** GREEN BACKGROUND ********************************/
.title-green {
  position: absolute;
  top: 100px;
  left: 0;
  width: 100%;
  height: calc(100% - 100px);
  background: #1a9276;
  z-index: 0;
}

.booking-container {
  position: relative; /* needed for z-index */
  z-index: 11; /* above .title-green */
  margin-top: 20px;
}

/******************************** NEW DASHBOARD UI ********************************/

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 20px;
}

.stat-box {
  background: #e9e9e9;
  padding: 20px;
  border-radius: 12px;
  text-align: left;
}

.stat-box p {
  color: #666;
  font-size: 14px;
}

.stat-box h2 {
  color: #114500;
  font-size: 32px;
  margin-top: 10px;
}

/******************************** FILTER BAR ********************************/

.filter-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #f1f1f1;
  padding: 10px 15px;
  border-radius: 12px;
}

.search-box {
  display: flex;
  align-items: center;
  background: #ddd;
  padding: 8px 12px;
  border-radius: 20px;
  width: 300px;
}

.search-box input {
  border: none;
  background: transparent;
  outline: none;
  margin-left: 8px;
  width: 100%;
}

/******************************** FILTER BUTTONS ********************************/

/* FILTER BUTTONS DEFAULT */
.filter-buttons button {
  padding: 8px 18px;
  border-radius: 20px;
  border: 1px solid #333;
  background: white;   /* lahat white by default */
  color: #333;         /* dark text by default */
  cursor: pointer;
  margin-left: 8px;
  font-weight: 500;
  transition: all 0.3s ease;
}

/* HOVER EFFECT */
.filter-buttons button:hover {
  background: #114500;  /* green on hover */
  color: white;
  border: none;
}

/* ACTIVE BUTTON (pag na-click) */
.filter-buttons .active {
  background: #114500;  /* green kapag active */
  color: white;
  border: none;
}
</style>
</head>

<body>

<!--------------------------------------- SIDEBAR ---------------------------------------------> 
<div class="sidebar">
  <div class="admin-header">
    <img src="IMAGES/cafebella.jpg" alt="Logo">
    <h2>Hello, Admin!</h2>
  </div>

  <div class="sidebar-overlay"></div>

  <div class="menu">
    <button><img src="IMAGES/dashboardpic.png" class="icon">Dashboard</button>
    <button><img src="IMAGES/POSicon.png" class="icon">POS</button>
     <button onclick="goToBooking()"><img src="IMAGES/Bookingicon.png" class="icon">Receive Booking Request</button>
    <button onclick="goToEventManagement()"><img src="IMAGES/eventmanagementicon.png" class="icon">Event Management</button>
    <button><img src="IMAGES/inventoryicon.png" class="icon">Inventory</button>
    <button><img src="IMAGES/feedbackicon.png" class="icon">Customer Feedback</button>
    <button><img src="IMAGES/calendaricon.png" class="icon">Calendar</button>
    <button><img src="IMAGES/settingsicon.png" class="icon">Settings</button>
  </div>
</div>

<!--------------------------------------- MAIN ---------------------------------------------> 
<div class="main">

  <!--------------------------------------- TOPBAR ---------------------------------------------> 
  <div class="topbar">
    <div class="left-section">
      <button id="menu-btn">☰</button>
      <div class="search-container">
        <span>🔍</span>
        <input type="text" placeholder="Search ...">
      </div>
    </div>

    <div class="admin" onclick="toggleDropdown()">
      <img src="IMAGES/cafebella.jpg" alt="Admin">
      <div class="admin-info">
        <span class="admin-name">Admin</span>
        <span class="admin-role">Administrator</span>
      </div>
      <span class="arrow">▼</span>
      <div id="adminDropdown" class="dropdown">
        <button onclick="login()">Login</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

<div class="content-wrapper">


  <!--------------------------------------- TITLE ---------------------------------------------> 
  <div class="title-container">
    <h1>Event Management</h1>
    <p>Manage all approve and completed events</p>
  </div>

<!--------------------------------------- GREEN BACKGROUND ---------------------------------------------> 
  <div class="title-green"></div>

<div class="booking-container">

  <!-- TOP STATS -->
  <div class="stats">
    <div class="stat-box">
      <p>Total Events</p>
      <h2>0</h2>
    </div>

    <div class="stat-box">
      <p>Upcoming</p>
      <h2>0</h2>
    </div>

    <div class="stat-box">
      <p>Completed</p>
      <h2>0</h2>
    </div>

    <div class="stat-box">
      <p>Total Revenue</p>
      <h2>0</h2>
    </div>
  </div>

  <!-- SEARCH + FILTER -->
  <div class="filter-bar">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" placeholder="Search Events ...">
    </div>

<div class="filter-buttons">
  <button id="btn-all">All</button>
  <button id="btn-upcoming">Upcoming</button>
  <button id="btn-completed">Completed</button>
</div>
  </div>

</div>

</div>

<script>
/******************************** Sidebar : BOOKING REQUEST BUTTON ********************************/
function goToBooking() {
  window.location.href = "Bookingrequest.html";
}
function goToEventManagement() {
  window.location.href = "Eventmanagement.html";
}

/******************************** FILTER BUTTON / All Upcoming Completed   ********************************/
const buttons = document.querySelectorAll('.filter-buttons button');

buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    buttons.forEach(b => b.classList.remove('active')); // tanggalin sa lahat
    btn.classList.add('active'); // lagyan ng green yung clicked
  });
});
/******************************** ADMIN DROPDOWN ********************************/
function toggleDropdown() {
  const dropdown = document.getElementById("adminDropdown");
  dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
}

function login() {
  alert("Redirect to Login Page");
}

function logout() {
  alert("Logged out!");
}

window.onclick = function(e) {
  if (!e.target.closest('.admin')) {
    document.getElementById("adminDropdown").style.display = "none";
  }
}

/******************************** SIDEBAR TOGGLE ********************************/
const menuBtn = document.getElementById("menu-btn");
const sidebar = document.querySelector(".sidebar");
const main = document.querySelector(".main");

menuBtn.onclick = function() {
  sidebar.classList.toggle("hide");
  main.classList.toggle("full");
};
</script>

</body>
</html>
