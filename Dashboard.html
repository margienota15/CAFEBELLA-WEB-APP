<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Domine', serif;
}
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }

/******************************** SIDEBAR ********************************/
.sidebar {
  width: 270px;
  height: 100vh;
  background: 
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url('IMAGES/webapppic.jpg'); 
  background-size: cover;      
  background-position: center;   
  background-repeat: no-repeat;
  display: flex;
  flex-direction: column;
  color: white;
  padding: 20px;
  position: fixed;
  left: 0;
  top: 0;
  transition: transform 0.3s ease;
  z-index: 100;
}
.sidebar.hide {
  transform: translateX(-100%);
}
.sidebar-overlay {
  position: absolute;
  top: 150px;  
  left: 15px;
  right: 15px;
  bottom: 85px;
  background: rgba(201, 247, 255, 0.5);
  z-index: 0;
}

/******************************** MENU BUTTON ********************************/
.menu {
  position: relative;
  margin-top: 20px;
  padding-bottom: 15px;
  border-bottom: 2px solid white;
  z-index: 1;
}
.menu button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.8);
  cursor: pointer;
  text-align: left;
  font-weight: bold;
  font-size: 15px;      
  font-weight: 600;      
  letter-spacing: 0.3px; 
  color: #2b2b2b;       
  padding-left: 40px; 
  display: flex;
  align-items: center;
  gap: 10px;
  line-height: 1;
  transition: all 0.3s ease;
}
.menu button.active {
  background: #2e7d32;
  color: white;
}
.menu button.active img.icon {
  filter: brightness(0) invert(1); 
}
.menu button:hover {
  background: #2e7d32; 
  color: white;
}
.menu button:hover img.icon {
  filter: brightness(0) invert(1);
}
.menu button img.icon {
  width: 25px;
  height: 25px;
  object-fit: contain;
  display: block; 
}
#menu-btn {
  font-size: 22px;
  background: #114500;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-right: 15px;
}


/*********************************** MAIN ********************************/
.main {
  flex: 1;
  margin-left: 270px;
  transition: margin-left 0.3s ease;

  display: flex;
  flex-direction: column;
}
.main.full {
  margin-left: 0;
}

/******************************** TOP BAR ********************************/
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #e9e9e9;
  padding: 15px 25px;
}
.left-section {
  display: flex;
  align-items: center;
  gap: 15px;
}

/******************************** SEARCH BAR ********************************/
.search-container {
  display: flex;
  align-items: center;
  background: #dcdcdc;
  padding: 8px 15px;
  border-radius: 25px;
  width: 350px;
}
.search-container span {
  margin-right: 10px;
  font-size: 16px;
}
.search-container input {
  border: none;
  background: transparent;
  outline: none;
  width: 100%;
}

/******************************** ADMIN ********************************/
.admin {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  position: relative;
  background: white;
  padding: 8px 15px;
  border-radius: 50px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}
.admin:hover {
  background: #f1f1f1;
}
.admin img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid #2e7d32;
  object-fit: cover;
}
.admin-info {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}
.admin-name {
  font-size: 14px;
  font-weight: 600;
  color: #1b5e20;
}
.admin-role {
  font-size: 11px;
  color: gray;
}
.arrow {
  font-size: 12px;
  color: #555;
}
.dropdown {
  display: none;
  position: absolute;
  top: 55px;
  right: 0;
  background: white;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  overflow: hidden;
  z-index: 100;
}
.dropdown button {
  width: 160px;
  padding: 12px;
  border: none;
  background: white;
  text-align: left;
  cursor: pointer;
  font-size: 14px;
}
.dropdown button:hover {
  background: #2e7d32;
  color: white;
}
.admin-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-bottom: 10px;      
  border-bottom: 2px solid white; 
  margin-top: 60px;
}
.admin-header h2 {
  margin: 0; 
  font-size: 22px;
}
.admin-header img {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #2e7d32;
}

/******************************** NAVBAR ********************************/
.title-container {
  padding: 20px 30px;
}
.title-container h1 {
  font-size: 28px;
  margin-bottom: 10px;
  color: #114500;
}
.title-container p {
  font-size: 16px;
  color: #555;
}
.content-wrapper {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden; 
}

/******************************** DASHBOARD ********************************/
.dashboard {
  padding: 0 30px 30px;
}
.stats {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 20px;
  margin-bottom: 20px;
}
.stat-card {
  background: #e9e9e9;
  padding: 15px;
  border-radius: 15px;
}
.stat-value {
  font-size: 30px;
  color: #114500;
  font-weight: bold;
}
.charts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.chart-box {
  background: #e9e9e9;
  padding: 20px;
  border-radius: 15px;
}
.chart-box h3 {
  color: #114500;
  margin-bottom: 10px;
}
</style>
</head>

<body>
<!-------------------------------------------- SIDEBAR ---------------------------------------------> 
<div class="sidebar">
  <div class="admin-header">
    <img src="IMAGES/cafebella.jpg" alt="Logo">
    <h2>Hello, Admin!</h2>
  </div>

  <div class="sidebar-overlay"></div>

<!--------------------------------------- MENU SIDEBAR ---------------------------------------------> 
<div class="menu">
  <button data-page="Dashboard.html"><img src="IMAGES/dashboardpic.png" class="icon">Dashboard</button>
  <button data-page="POS.html"><img src="IMAGES/POSicon.png" class="icon">POS</button>
  <button data-page="Bookingrequest.html"><img src="IMAGES/Bookingicon.png" class="icon">Receive Booking Request</button>
  <button data-page="Eventmanagement.html"><img src="IMAGES/eventmanagementicon.png" class="icon">Event Management</button>
  <button data-page="Inventory.html"><img src="IMAGES/inventoryicon.png" class="icon">Inventory</button>
  <button data-page="Feedback.html"><img src="IMAGES/feedbackicon.png" class="icon">Customer Feedback</button>
  <button data-page="Calendar.html"><img src="IMAGES/calendaricon.png" class="icon">Calendar</button>
  <button data-page="Settings.html"><img src="IMAGES/settingsicon.png" class="icon">Settings</button>
</div>
</div>

<!--------------------------------------- MAIN ---------------------------------------------> 
    <div class="main">

<!--------------------------------------- TOPBAR ---------------------------------------------> 
  <div class="topbar">
    <div class="left-section">
      <button id="menu-btn">☰</button>
      <div class="search-container">
        <span>🔍</span>
        <input type="text" placeholder="Search ...">
      </div>
    </div>

    <div class="admin" onclick="toggleDropdown()">
      <img src="IMAGES/cafebella.jpg" alt="Admin">
      <div class="admin-info">
        <span class="admin-name">Admin</span>
        <span class="admin-role">Administrator</span>
      </div>
      <span class="arrow">▼</span>
      <div id="adminDropdown" class="dropdown">
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

<div class="content-wrapper">

<!--------------------------------------- TITLE ---------------------------------------------> 
  <div class="title-container">
    <h1>Dashboard</h1>
    <p>Welcome back! Here's what is happening with your events</p>
  </div>

<!--------------------------------------- DASHBOARD ---------------------------------------------> 
  <div class="dashboard">

    <div class="stats">
      <div class="stat-card"><div>Total event bookings</div><div class="stat-value">0</div></div>
      <div class="stat-card"><div>Pending Requests</div><div class="stat-value">0</div></div>
      <div class="stat-card"><div>Upcoming Events</div><div class="stat-value">0</div></div>
      <div class="stat-card"><div>Low stock</div><div class="stat-value">0</div></div>
      <div class="stat-card"><div>Average Rating</div><div class="stat-value">0</div></div>
    </div>

    <div class="charts">
      <div class="chart-box">
        <h3>Booking Trends</h3>
        <canvas id="lineChart"></canvas>
      </div>

      <div class="chart-box">
        <h3>Event sales and profits</h3>
        <canvas id="barChart"></canvas>
      </div>
    </div>
  </div>
</div>

</body>
</html>

<script>
/******************************** Sidebar : BUTTON PAGE ********************************/
function goToDashboard() {
  window.location.href = "Dashboard.html";
}
function goToBooking() {
  window.location.href = "Bookingrequest.html";
}
function goToEventManagement() {
  window.location.href = "Eventmanagement.html";
}

/******************************** MENU BUTTON ********************************/
  const sidebarButtons = document.querySelectorAll('.sidebar .menu button');

/******************************** GET THE CURRENT PAGE ********************************/
  function getCurrentPage() {
    return window.location.pathname.split("/").pop(); 
  }

/******************************** HIGHLIGHT THE BUTTON OF THE CURRENT PAGE ********************************/
  function highlightSidebar() {
    const currentPage = getCurrentPage().toLowerCase();
    sidebarButtons.forEach(btn => {
      btn.classList.remove('active');
      if (btn.dataset.page.toLowerCase() === currentPage) {
        btn.classList.add('active');
      }
    });
  }

/******************************** BUTTON HIGHLIGHT ********************************/
  highlightSidebar();

/******************************** NAVIGATE WHEN CLICKED ********************************/
  sidebarButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const targetPage = btn.dataset.page;

      sidebarButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

/******************************** NAVIGATE THE TARGET PAGE ********************************/
      window.location.href = targetPage;
    });
  });

/******************************** UPDATE THE HIGHLIGHT ON THE BROWSER ********************************/
  window.addEventListener('popstate', () => {
    highlightSidebar();
  });

/******************************** ADMIN DROPDOWN ********************************/
function toggleDropdown() {
  const dropdown = document.getElementById("adminDropdown");
  dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
}
function logout() {
  window.location.href = "login.html";
}

window.onclick = function(e) {
  if (!e.target.closest('.admin')) {
    document.getElementById("adminDropdown").style.display = "none";
  }
}

/******************************** SIDEBAR TOGGLE ********************************/
const menuBtn = document.getElementById("menu-btn");
const sidebar = document.querySelector(".sidebar");
const main = document.querySelector(".main");

menuBtn.onclick = function() {
  sidebar.classList.toggle("hide");
  main.classList.toggle("full");
};

/******************************** LINE CHART ********************************/
new Chart(document.getElementById('lineChart'), {
  type: 'line',
  data: {
    labels: ['Oct','Nov','Dec','Jan','Feb','Mar','Apr','May','Jun'],
    datasets: [{
      data: [35,60,30,35,45,10,25,55,75],
      borderColor: '#114500',
      fill: false
    }]
  }
});

/******************************** BAR CHART ********************************/
new Chart(document.getElementById('barChart'), {
  type: 'bar',
  data: {
    labels: ['Coffee Booth','Matcha Booth','Tattoo Event'],
    datasets: [{
      data: [30000,45000,60000],
      backgroundColor: '#114500'
    }]
  }
});
</script>
