<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  /* BACKGROUND IMAGE */
  background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
              url('IMAGES/BG.jpg') no-repeat center center;
  background-size: cover;
  background-attachment: fixed;

  /* FADE EFFECT */
  opacity: 0;
  transition: opacity 0.4s ease;
  
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url('IMAGES/BG.jpg') center/cover no-repeat;
  filter: blur(8px);
  z-index: -1;
}
body.fade-in {
  opacity: 1;
}

/* MAIN CARD */
.login-container {
  width: 850px;
  height: 480px;
  display: flex;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

/* LEFT IMAGE */
.left-panel {
  width: 50%;
  background: url('IMAGES/BG.jpg') no-repeat center;
  background-size: cover;
}

/* RIGHT SIDE */
.right-panel {
  width: 50%;
  background: linear-gradient(135deg, #3b2416, #5a3a25);
  color: white;
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* TITLE */
.right-panel h1 {
  margin-bottom: 20px;
}

/* INPUTS */
.input-group {
  margin-bottom: 15px;
}

.input-group label {
  font-size: 13px;
  display: block;
  margin-bottom: 5px;
}

.input-group input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
}
.login-btn {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: #ffffff;
  color: #2e7d32;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.3s ease;
}

/* HOVER → GREEN */
.login-btn:hover {
  background: linear-gradient(135deg, #4CAF50, #2e7d32);
  color: #fff;
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

/* CLICK */
.login-btn:active {
  transform: scale(0.96);
}

/* SHINE EFFECT */
.login-btn::after {
  content: "";
  position: absolute;
  top: 0;
  left: -75%;
  width: 50%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.6),
    transparent
  );
  transition: 0.5s;
}

.login-btn:hover::after {
  left: 130%;
}

/* LINKS */
.forgot {
  margin-top: 10px;
  font-size: 13px;
  color: #ddd;
}

/* DIVIDER */
.divider {
  margin: 20px 0;
  display: flex;
  align-items: center;
}

.divider::before,
.divider::after {
  content: "";
  flex: 1;
  border-bottom: 1px solid #aaa;
}

.divider span {
  margin: 0 10px;
  font-size: 13px;
}

/* SOCIAL */
.social-login {
  display: flex;
  gap: 15px;
  justify-content: center;
}

.social-login img {
  width: 25px;
  cursor: pointer;
}

/* SIGNUP */
.signup {
  margin-top: 20px;
  font-size: 14px;
  text-align: center;
}

.signup a {
  color: #fff;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="login-container">

  <!-- LEFT IMAGE -->
  <div class="left-panel"></div>

  <!-- RIGHT FORM -->
  <div class="right-panel">

    <h1>Login</h1>

    <form>
      <div class="input-group">
        <label>Email</label>
        <input type="text" placeholder="Enter your email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password">
      </div>

      <button class="login-btn">Login</button>
    </form>

    <p class="forgot">Forgot password?</p>

    <div class="divider"><span>or</span></div>

    <div class="social-login">
      <a href="#"><img src="IMAGES/facebookicon.png"></a>
      <a href="#"><img src="IMAGES/gmailicon.png"></a>
    </div>

    <p class="signup">
      Don’t have an account? <a href="Signup.html">Sign up</a>
    </p>

  </div>

</div>

<script>
window.addEventListener("load", () => {
  document.body.classList.add("fade-in");
});
</script>

</body>
</html>
