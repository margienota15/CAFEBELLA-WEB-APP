<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Transaction History</title>

<link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Domine', serif;
}
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }

/******************************** SIDEBAR ********************************/
.sidebar {
  width: 270px;
  height: 100vh;
  background: 
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url('IMAGES/webapppic.jpg'); 
  background-size: cover;      
  background-position: center;   
  background-repeat: no-repeat;
  display: flex;
  flex-direction: column;
  color: white;
  padding: 20px;
  position: fixed;
  left: 0;
  top: 0;
  transition: transform 0.3s ease;
  z-index: 100;
}
.sidebar.hide {
  transform: translateX(-100%);
}
.sidebar-overlay {
  position: absolute;
  top: 150px;
  left: 15px;
  right: 15px;
  bottom: 15px;
  background: rgba(201, 247, 255, 0.5);
  z-index: 0;
}

/******************************** MENU BUTTON ********************************/
.menu {
  position: relative;
  margin-top: 20px;
  padding-bottom: 15px;
  border-bottom: 2px solid white;
  z-index: 1;
}
.menu button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.8);
  cursor: pointer;
  text-align: left;
  font-weight: bold;
  font-size: 15px;      
  font-weight: 600;      
  letter-spacing: 0.3px; 
  color: #2b2b2b;       
  padding-left: 40px; 
  display: flex;
  align-items: center;
  gap: 10px;
  line-height: 1;
  transition: all 0.3s ease;
}
.menu button.active {
  background: #2e7d32;
  color: white;
}
.menu button.active img.icon {
  filter: brightness(0) invert(1); 
}
.menu button:hover {
  background: #2e7d32; 
  color: white;
}
.menu button:hover img.icon {
  filter: brightness(0) invert(1);
}
.menu button img.icon {
  width: 25px;
  height: 25px;
  object-fit: contain;
  display: block; 
}
#menu-btn {
  font-size: 22px;
  background: #114500;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-right: 15px;
}

/*********************************** MAIN ********************************/
.main {
  flex: 1;
  margin-left: 270px;
  transition: margin-left 0.3s ease;

  display: flex;
  flex-direction: column;
}
.main.full {
  margin-left: 0;
}

/******************************** TOP BAR ********************************/
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #e9e9e9;
  padding: 15px 25px;
}
.left-section {
  display: flex;
  align-items: center;
  gap: 15px;
}

/******************************** SEARCH BAR ********************************/
.search-container {
  display: flex;
  align-items: center;
  background: #dcdcdc;
  padding: 8px 15px;
  border-radius: 25px;
  width: 350px;
}
.search-container span {
  margin-right: 10px;
  font-size: 16px;
}
.search-container input {
  border: none;
  background: transparent;
  outline: none;
  width: 100%;
}

/******************************** ADMIN ********************************/
.admin {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  position: relative;
  background: white;
  padding: 8px 15px;
  border-radius: 50px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}
.admin:hover {
  background: #f1f1f1;
}
.admin img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid #2e7d32;
  object-fit: cover;
}
.admin-info {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}
.admin-name {
  font-size: 14px;
  font-weight: 600;
  color: #1b5e20;
}
.admin-role {
  font-size: 11px;
  color: gray;
}
.arrow {
  font-size: 12px;
  color: #555;
}
.dropdown {
  display: none;
  position: absolute;
  top: 55px;
  right: 0;
  background: white;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  overflow: hidden;
  z-index: 100;
}
.dropdown button {
  width: 160px;
  padding: 12px;
  border: none;
  background: white;
  text-align: left;
  cursor: pointer;
  font-size: 14px;
}
.dropdown button:hover {
  background: #2e7d32;
  color: white;
}
.admin-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-bottom: 10px;      
  border-bottom: 2px solid white; 
  margin-top: 60px;
}
.admin-header h2 {
  margin: 0; 
  font-size: 22px;
}
.admin-header img {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #2e7d32;
}

/******************************** NAVBAR ********************************/
.title-container {
  padding: 20px 30px;
}
.title-container h1 {
  font-size: 28px;
  margin-bottom: 10px;
  color: #114500;
}
.title-container p {
  font-size: 16px;
  color: #555;
}
.content-wrapper {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden; 
}
/******************************** MAIN CONTAINER ********************************/
.container {
  margin: 20px 30px;
  background: #f7f9fc;
  padding: 20px;
  border-radius: 18px;
  border: 1px solid #eef1f5;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
  position: relative;
  overflow: hidden;
}

/* soft top glow like mobile apps */
.container::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  height: 5px;
  width: 100%;
  background: linear-gradient(90deg, #114500, #114500, #114500);
  opacity: 0.9;
}


/************************* KEY PERFORMANCE INDICATOR ********************************/
/* KPI ROW */
.kpi-row {
  display: flex;
  gap: 12px;
  margin-bottom: 18px;
}
/* KPI CARD */
.kpi {
  flex: 1;
  background: #ffffff;
  border-radius: 16px;
  padding: 14px 12px;
  text-align: center;
  border: 1px solid #edf0f4;
  box-shadow: 0 3px 10px rgba(0,0,0,0.04);
  transition: 0.2s ease;
  position: relative;
  overflow: hidden;
}

/* hover effect */
.kpi:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 14px rgba(0,0,0,0.08);
}

/* small top accent */
.kpi::after {
  content: "";
  width: 6px;
  height: 6px;
  background: #114500;
  border-radius: 50%;
  position: absolute;
  top: 10px;
  right: 10px;
}

/* LABEL (small grey text like GCash) */
.kpi .label {
  font-size: 11px;
  color: #6b7280;
  margin-bottom: 6px;
  display: block;
}

/* VALUE (bold clean number) */
.kpi .value {
  font-size: 20px;
  font-weight: 700;
  color: #0f172a;
  letter-spacing: 0.3px;
}
/******************************** FILTER BUTTON ********************************/
/* FILTER BAR */
.filter-bar {
  margin-bottom: 15px;
}

/* SEARCH STYLE */
.search-box input {
  width: 100%;
  padding: 10px 15px;
  border-radius: 25px;
  border: none;
  background: #e9edf0;
  outline: none;
  margin-bottom: 10px;
}

/* FILTER BUTTONS */
.filter-buttons {
  display: flex;
  justify-content: center; /* 🔥 CENTER HORIZONTALLY */
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  width: 100%; /* important para gumana ang center */
}

.filter-buttons button {
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  background: #e3e7ea;
  cursor: pointer;
  font-size: 13px;
  transition: 0.2s;
}

.filter-buttons button:hover {
  background: #114500;
  color: white;
}
.filter-bar {
  display: flex;
  justify-content: center;
}
/* ================= MODAL ANIMATION UPGRADE ================= */

/* hidden state animation base */
.date-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0);
  justify-content: center;
  align-items: center;
  z-index: 999;

  transition: background 0.25s ease;
}

/* modal box animation */
.date-content {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 280px;

  transform: scale(0.7);
  opacity: 0;

  transition: all 0.25s ease;
}
.date-modal.show {
  display: flex;
  background: rgba(0,0,0,0.45);
}

.date-modal.show .date-content {
  transform: scale(1);
  opacity: 1;
  animation: popBounce 0.3s ease;
}

/* little bounce effect */
@keyframes popBounce {
  0% { transform: scale(0.7); }
  60% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
.date-content h3 {
  margin-bottom: 10px;
}

.date-content label {
  display: block;
  margin: 8px 0;
  cursor: pointer;
}

.date-actions {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
}

.date-actions button {
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.date-actions button:first-child {
  background: #114500;
  color: white;
}

/******************************** TRANSACTION CARD ********************************/
.card {
    background: white;
    border-left: 6px solid #114500;
    padding: 15px 18px;
    margin-bottom: 15px;
    border-radius: 12px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    transition: 0.2s;
}
.card:hover {
    transform: scale(1.01);
}

/******************************** TOP INFO ********************************/
.top {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: gray;
}

/******************************** ITEMS ********************************/
.items {
    margin-top: 10px;
    font-size: 14px;
    color: #333;
    line-height: 1.6;
}

/******************************** TOTAL ********************************/
.total {
    margin-top: 10px;
    font-size: 16px;
    font-weight: 700;
    color: #114500;
}

/******************************** METHOD ********************************/
.method {
    margin-top: 5px;
    font-size: 12px;
    color: #555;
}

/******************************** EMPTY STATE ********************************/
.empty {
    text-align: center;
    margin-top: 80px;
    color: gray;
}

</style>
</head>
<body>
<!-------------------------------------------- SIDEBAR ---------------------------------------------> 
<div class="sidebar">
  <div class="admin-header">
    <img src="IMAGES/cafebella.jpg" alt="Logo">
    <h2>Hello, Admin!</h2>
  </div>

  <div class="sidebar-overlay"></div>

<!--------------------------------------- MENU SIDEBAR ---------------------------------------------> 
    <div class="menu">
      <button data-page="Dashboard.html"><img src="IMAGES/dashboardpic.png" class="icon">Dashboard</button>
      <button data-page="POS.html"><img src="IMAGES/POSicon.png" class="icon">POS</button>
      <button data-page="Transactionhistory.html"><img src="IMAGES/transactionhistoryicon.png" class="icon">Transaction History</button>
      <button data-page="Bookingrequest.html"><img src="IMAGES/Bookingicon.png" class="icon">Receive Booking Request</button>
      <button data-page="Eventmanagement.html"><img src="IMAGES/eventmanagementicon.png" class="icon">Event Management</button>
      <button data-page="Inventory.html"><img src="IMAGES/inventoryicon.png" class="icon">Inventory</button>
      <button data-page="Feedback.html"><img src="IMAGES/feedbackicon.png" class="icon">Customer Feedback</button>
      <button data-page="Calendar.html"><img src="IMAGES/calendaricon.png" class="icon">Calendar</button>
      <button data-page="Settings.html"><img src="IMAGES/settingsicon.png" class="icon">Settings</button>
    </div>
    </div>

<!--------------------------------------- MAIN ---------------------------------------------> 
    <div class="main">

<!--------------------------------------- TOPBAR ---------------------------------------------> 
  <div class="topbar">
    <div class="left-section">
      <button id="menu-btn">☰</button>
      <div class="search-container">
        <span>🔍</span>
        <input type="text" placeholder="Search ...">
      </div>
    </div>

    <div class="admin" onclick="toggleDropdown()">
      <img src="IMAGES/cafebella.jpg" alt="Admin">

      </div>

<div class="content-wrapper">

<!--------------------------------------- TITLE ---------------------------------------------> 
  <div class="title-container">
    <h1>Transaction History</h1>

<!--------------------------------------- CONTAINER -------------------------------------------->
<div class="container">

    <!---------------------- KPI HEADER ----------------------------> 
    <div class="kpi-row">
        <div class="kpi">
            <span class="label">Total Transactions</span>
            <span class="value" id="totalTx">0</span>
        </div>

        <div class="kpi">
            <span class="label">Total Sales</span>
            <span class="value" id="totalSales">₱0.00</span>

<script>
/******************************** Sidebar : BUTTON PAGE ********************************/
function goToDashboard() {
  window.location.href = "Dashboard.html";
}
function goToPOS() {
  window.location.href = "POS.html";
}
function goToTransactionHistory() {
  window.location.href = "Transactionhistory.html";
}
function goToBooking() {
  window.location.href = "Bookingrequest.html";
}
function goToEventManagement() {
  window.location.href = "Eventmanagement.html";
}

/******************************** MENU BUTTON ********************************/
  const sidebarButtons = document.querySelectorAll('.sidebar .menu button');

/******************************** GET THE CURRENT PAGE ********************************/
  function getCurrentPage() {
    return window.location.pathname.split("/").pop(); 
  }

/******************************** HIGHLIGHT THE BUTTON OF THE CURRENT PAGE ********************************/
  function highlightSidebar() {
    const currentPage = getCurrentPage().toLowerCase();
    sidebarButtons.forEach(btn => {
      btn.classList.remove('active');
      if (btn.dataset.page.toLowerCase() === currentPage) {
        btn.classList.add('active');
      }
    });
  }

/******************************** BUTTON HIGHLIGHT ********************************/
  highlightSidebar();

/******************************** NAVIGATE WHEN CLICKED ********************************/
  sidebarButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const targetPage = btn.dataset.page;

      sidebarButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

/******************************** NAVIGATE THE TARGET PAGE ********************************/
      window.location.href = targetPage;
    });
  });

/******************************** UPDATE THE HIGHLIGHT ON THE BROWSER ********************************/
  window.addEventListener('popstate', () => {
    highlightSidebar();
  });

/******************************** ADMIN DROPDOWN ********************************/
function toggleDropdown() {
  const dropdown = document.getElementById("adminDropdown");
  dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
}
function logout() {
  window.location.href = "login.html";
}

window.onclick = function(e) {
  if (!e.target.closest('.admin')) {
    document.getElementById("adminDropdown").style.display = "none";
  }
}

/******************************** SIDEBAR TOGGLE ********************************/
const menuBtn = document.getElementById("menu-btn");
const sidebar = document.querySelector(".sidebar");
const main = document.querySelector(".main");

menuBtn.onclick = function() {
  sidebar.classList.toggle("hide");
  main.classList.toggle("full");
};

/******************************** FILTER ********************************/
function applyFilter(type){

    let sorted = [...transactions];

    if(type === "date"){
        sorted.sort((a,b) => new Date(b.date) - new Date(a.date));
    }

    if(type === "amount"){
        sorted.sort((a,b) => b.total - a.total);
    }

    if(type === "transaction"){
        sorted.sort((a,b) => a.paymentMethod.localeCompare(b.paymentMethod));
    }

    if(type === "status"){
        // kung wala ka pang status, skip muna
        alert("Status filter coming soon 😄");
        return;
    }

    renderTransactions(sorted);
}

/******************************** OPEN / CLOSE MODALS ********************************/

/****** DATE MODALS ************/
function openDateModal(){
  const modal = document.getElementById("dateModal");
  modal.style.display = "flex";

  setTimeout(() => {
    modal.classList.add("show");
  }, 10);
}

function closeDateModal(){
  const modal = document.getElementById("dateModal");
  modal.classList.remove("show");

  setTimeout(() => {
    modal.style.display = "none";
  }, 200);
}

/****** TRANSACTION MODAL ************/
function openTransactionModal(){
  const modal = document.getElementById("transactionModal");
  modal.style.display = "flex";

  setTimeout(() => modal.classList.add("show"), 10);
}

function closeTransactionModal(){
  const modal = document.getElementById("transactionModal");
  modal.classList.remove("show");

  setTimeout(() => modal.style.display = "none", 200);
}

/****** AMOUNT MODAL ************/
function openAmountModal(){
  const modal = document.getElementById("amountModal");
  modal.style.display = "flex";

  setTimeout(() => modal.classList.add("show"), 10);
}

function closeAmountModal(){
  const modal = document.getElementById("amountModal");
  modal.classList.remove("show");

  setTimeout(() => modal.style.display = "none", 200);
}

/****** STATUS MODAL ************/
function openStatusModal(){
  const modal = document.getElementById("statusModal");
  modal.style.display = "flex";

  setTimeout(() => modal.classList.add("show"), 10);
}

function closeStatusModal(){
  const modal = document.getElementById("statusModal");
  modal.classList.remove("show");

  setTimeout(() => modal.style.display = "none", 200);
}

/******************************** DATE FILTER ********************************/
function applyDateFilter(){

  const selected = document.querySelector('input[name="dateFilter"]:checked');
  if(!selected) return alert("Select date range");

  const days = parseInt(selected.value);

  const today = new Date();
  const pastDate = new Date();
  pastDate.setDate(today.getDate() - days);

  const filtered = transactions.filter(tx => {
    const txDate = new Date(tx.date);
    return txDate >= pastDate && txDate <= today;
  });

  renderTransactions(filtered);
  closeDateModal();
}

/******************************** TRANSACTION FILTER ********************************/
function applyTransactionFilter(){

  const selected = document.querySelector('input[name="transactionFilter"]:checked');
  if(!selected) return alert("Select transaction type");

  const filtered = transactions.filter(tx =>
    tx.paymentMethod === selected.value
  );

  renderTransactions(filtered);
  closeTransactionModal();
}

/******************************** AMOUNT FILTER ********************************/
function applyAmountFilter(){

  const selected = document.querySelector('input[name="amountFilter"]:checked');
  if(!selected) return alert("Select amount filter");

  let sorted = [...transactions];

  if(selected.value === "low"){
    sorted.sort((a,b) => a.total - b.total);
  }

  if(selected.value === "high"){
    sorted.sort((a,b) => b.total - a.total);
  }

  renderTransactions(sorted);
  closeAmountModal();
}

/******************************** STATUS FILTER ********************************/
function applyStatusFilter(){

  const selected = document.querySelector('input[name="statusFilter"]:checked');
  if(!selected) return alert("Select status");

  const filtered = transactions.filter(tx =>
    tx.status === selected.value
  );

  renderTransactions(filtered);
  closeStatusModal();
}
/******************************** RECORD TRANSACTION FROM POS ********************************/
let transactions = JSON.parse(localStorage.getItem("cafeBellaTransactions")) || [];

const container = document.getElementById("historyContainer");

function renderTransactions(data){

    container.innerHTML = "";

    if(data.length === 0){
        container.innerHTML = `<div class="empty">No transactions found</div>`;
        return;
    }

    data.slice().reverse().forEach(tx => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="top">
                <span>ID: ${tx.id}</span>
                <span>${tx.date}</span>
            </div>

            <div class="items">
                ${tx.items.map(i => `• ${i.name} - ₱${i.price}`).join("<br>")}
            </div>

            <div class="method">Payment Method: ${tx.paymentMethod}</div>

            <div class="total">
                Total: ₱${tx.total.toFixed(2)}
            </div>
        `;

        container.appendChild(div);
    });
}

/* STATS */
function updateStats(){
    let totalTx = transactions.length;
    let totalSales = 0;

    transactions.forEach(tx => {
        totalSales += tx.total;
    });

    document.getElementById("totalTx").innerText = totalTx;
    document.getElementById("totalSales").innerText = "₱" + totalSales.toFixed(2);

    // today sales
    let today = new Date().toLocaleDateString();
    let todaySales = 0;

    transactions.forEach(tx => {
        if(tx.date.includes(today)){
            todaySales += tx.total;
        }
    });

    document.getElementById("todaySales").innerText = "₱" + todaySales.toFixed(2);
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", function(){
    let keyword = this.value.toLowerCase();

    let filtered = transactions.filter(tx =>
        tx.items.some(i => i.name.toLowerCase().includes(keyword)) ||
        tx.paymentMethod.toLowerCase().includes(keyword) ||
        tx.id.toString().includes(keyword)
    );

    renderTransactions(filtered);
});

renderTransactions(transactions);
updateStats();
</script>
