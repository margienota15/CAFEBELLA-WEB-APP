<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cafe Bella POS</title>

<link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Domine', serif;
}
body {
  display: flex;
  min-height: 100vh;
  overflow: hidden; /* pwede mo keep */
}

/******************************** SIDEBAR ********************************/
.sidebar {
  width: 270px;
  height: 100vh;
  background: 
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url('IMAGES/webapppic.jpg'); 
  background-size: cover;      
  background-position: center;   
  background-repeat: no-repeat;
  display: flex;
  flex-direction: column;
  color: white;
  padding: 20px;
  position: fixed;
  left: 0;
  top: 0;
  transition: transform 0.3s ease;
  z-index: 100;
}
.sidebar.hide {
  transform: translateX(-100%);
}
.sidebar-overlay {
  position: absolute;
  top: 150px;  
  left: 15px;
  right: 15px;
  bottom: 85px;
  background: rgba(201, 247, 255, 0.5);
  z-index: 0;
}

/******************************** MENU BUTTON ********************************/
.menu {
  position: relative;
  margin-top: 20px;
  padding-bottom: 15px;
  border-bottom: 2px solid white;
  z-index: 1;
}
.menu button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.8);
  cursor: pointer;
  text-align: left;
  font-weight: bold;
  font-size: 15px;      
  font-weight: 600;      
  letter-spacing: 0.3px; 
  color: #2b2b2b;       
  padding-left: 40px; 
  display: flex;
  align-items: center;
  gap: 10px;
  line-height: 1;
  transition: all 0.3s ease;
}
.menu button.active {
  background: #2e7d32; 
  color: white;
}
.menu button.active img.icon {
  filter: brightness(0) invert(1); 
}
.menu button:hover {
  background: #2e7d32; 
  color: white;
}
.menu button:hover img.icon {
  filter: brightness(0) invert(1);
}
.menu button img.icon {
  width: 25px;
  height: 25px;
  object-fit: contain;
  display: block; 
}
#menu-btn { 
  font-size: 22px;
  background: #114500;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-right: 15px;
}
#editMenuBtn {
  transition: all 0.2s ease;
  background: #114500;
  color: white;
}
#editMenuBtn:hover {
  background: #f8f8f8;
  color: #114500;
  border: 1px solid #114500;
}
#editMenuBtn.save-mode {
  background: #f8f8f8;
  color: #114500;
  border: 1px solid #6f6f6f;
}
#editMenuBtn.save-mode:hover {
  background: #114500;
  color: white;
  border: 1px solid #114500;
}

/******************************** MAIN ********************************/
.main {
  flex: 1;
  margin-left: 270px;
  display: flex;
  flex-direction: column;

  height: 100vh;        /* 🔥 THIS IS THE FIX */
  overflow: hidden;     /* 🔥 IMPORTANT */
}
.main.full {
  margin-left: 0;
}

/******************************** TOP BAR ********************************/
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #e9e9e9;
  padding: 15px 25px;
}
.left-section {
  display: flex;
  align-items: center;
  gap: 15px;
}

/******************************** SEARCH BAR ********************************/
.search-container {
  display: flex;
  align-items: center;
  background: #dcdcdc;
  padding: 8px 15px;
  border-radius: 25px;
  width: 350px;
}

.search-container span {
  margin-right: 10px;
  font-size: 16px;
}
.search-container input {
  border: none;
  background: transparent;
  outline: none;
  width: 100%;
}

/******************************** ADMIN ********************************/
.admin {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  position: relative;
  background: white;
  padding: 8px 15px;
  border-radius: 50px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}
.admin:hover {
  background: #f1f1f1;
}
.admin img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid #2e7d32;
  object-fit: cover;
}
.admin-info {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}
.admin-name {
  font-size: 14px;
  font-weight: 600;
  color: #1b5e20;
}
.admin-role {
  font-size: 11px;
  color: gray;
}
.arrow {
  font-size: 12px;
  color: #555;
}
.dropdown {
  display: none;
  position: absolute;
  top: 55px;
  right: 0;
  background: white;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  overflow: hidden;
  z-index: 100;
}
.dropdown button {
  width: 160px;
  padding: 12px;
  border: none;
  background: white;
  text-align: left;
  cursor: pointer;
  font-size: 14px;
}
.dropdown button:hover {
  background: #2e7d32;
  color: white;
}
.admin-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-bottom: 10px;      
  border-bottom: 2px solid white; 
  margin-top: 60px;
}
.admin-header h2 {
  margin: 0; 
  font-size: 22px;
}
.admin-header img {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #2e7d32;
}

/******************************** NAVBAR ********************************/
.title-container {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-left: 3px;
  margin-left: 0;
  padding-top: 9px;
}

.title-container h1 {
  font-size: 28px;
  margin-bottom: 10px;
  color: #114500;
}

.title-container p {
  font-size: 16px;  
  color: #555;
}

/******************************** CONTENT ********************************/
.content {
  display: flex;
  flex: 1;
  gap: 20px;

  overflow: hidden; /* 🔥 ADD THIS */
}
.content-wrapper {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px 30px; 
  z-index: 10;
  height: calc(100vh - 80px);
  overflow: hidden; /* 🔥 importante */
}
/******************************** CATEGORIES ********************************/
.categories {
  display: flex;
  gap: 10px;
  padding: 10px;
  flex-wrap: wrap;
}
.categories button {
  padding: 8px 15px;
  border: none;
  background: #ddd;
  cursor: pointer;
  border-radius: 6px;
}
.categories button.active {
  background: #114500;
  color: white;
}

/******************************** PRODUCTS ********************************/
.products {
  flex: 1;
  min-width: 0; 
  overflow-y: auto;
  display: grid;
  grid-template-columns: repeat(5, 1fr); /* bawasan para magkasya */
  gap: 15px;
}
.card {
  background: white;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
  text-align: center;
  transition: 0.2s;
}
.card:hover {
  transform: scale(1.05);
}
.card img {
  width: 100%;
  height: 90px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 10px;
}
.card h4 {
  font-size: 12px;
  margin-bottom: 5px;
}
.card p {
  color: #114500;
  font-weight: bold;
}

/******************************** ORDER PANEL ********************************/
.order {
  width: 300px;
  min-width: 280px;
  background: white;
  padding: 20px;

  display: flex;
  flex-direction: column;

  border-left: 3px solid #e0e0e0;

  overflow: hidden; /* 🔥 ADD */
}
.order-items {
  flex: 1;
  overflow-y: auto;
  margin-top: 10px;
}
.order-footer {
  border-top: 1px solid #eee;
  padding-top: 10px;
  background: white;
}
.order-items::-webkit-scrollbar {
  width: 6px;
}

.order-items::-webkit-scrollbar-thumb {
  background: #114500;
  border-radius: 10px;
}
.item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
  font-size: 14px;
}
.total {
  font-weight: bold;
  font-size: 18px;
  margin-top: 10px;
}
button.action {
  padding: 12px;
  border: none;
  color: white;
  background: #114500;
  cursor: pointer;
  border-radius: 6px;
}
.left-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px 30px;
}

/******************************** MODAL ********************************/
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);

  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 25px;
  width: 400px;
  border-radius: 12px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-items {
  max-height: 150px;
  overflow-y: auto;
  margin-bottom: 10px;
}

.section {
  margin-top: 10px;
}

.modal-content select,
.modal-content input {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border-radius: 6px;
  border: 1px solid #ccc;
}
/******************************** VOUCHER ********************************/
.voucher-box {
  margin-top: 10px;
  padding: 10px;
  border: 1px solid #eee;
  border-radius: 6px;
  background: #fafafa;
}
/******************************** DELETE BUTTON ********************************/
.delete-btn {
  margin-top: 8px;
  padding: 6px 10px;
  border: 1px solid #e0e0e0;
  background: #ffffff;
  color: #c0392b;
  font-size: 12px;
  border-radius: 6px;
  cursor: pointer;
}
.delete-btn:hover {
  background: #f8f8f8;
  border-color: #c0392b;
}
</style>
</head>

<body>

<!--------------------------------------- SIDEBAR ---------------------------------------------> 
    <div class="sidebar">
      <div class="admin-header">
        <img src="IMAGES/cafebella.jpg" alt="Logo">
        <h2>Hello, Admin!</h2>

<!--------------------------------------- MENU SIDEBAR --------------------------------------------->

<script>
/******************************** Sidebar : BUTTON PAGE ********************************/
function goToDashboard() {
  window.location.href = "Dashboard.html";
}
function goToPOS() {
  window.location.href = "POS.html";
}
function goToBooking() {
  window.location.href = "Bookingrequest.html";
}
function goToEventManagement() {
  window.location.href = "Eventmanagement.html";
}

/******************************** MENU BUTTON ********************************/
    const sidebarButtons = document.querySelectorAll('.sidebar .menu button');

/******************************** GET THE CURRENT PAGE ********************************/
function getCurrentPage() {
  return window.location.pathname.split("/").pop(); 
}

/******************************** HIGHLIGHT THE BUTTON OF THE CURRENT PAGE ********************************/
function highlightSidebar() {
  const currentPage = getCurrentPage().toLowerCase();
    sidebarButtons.forEach(btn => {
      btn.classList.remove('active');
      
      if (btn.dataset.page.toLowerCase() === currentPage) {
          btn.classList.add('active');
      }
  });
}

/******************************** BUTTON HIGHLIGHT ********************************/
    highlightSidebar();

/******************************** NAVIGATE WHEN CLICKED ********************************/
sidebarButtons.forEach(btn => {
   btn.addEventListener('click', () => {
    const targetPage = btn.dataset.page;

    sidebarButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    window.location.href = targetPage;
    });
  });

/******************************** UPDATE THE HIGHLIGHT ON THE BROWSER ********************************/
    window.addEventListener('popstate', () => {
     highlightSidebar();
  });

/******************************** ADMIN DROPDOWN ********************************/
function toggleDropdown() {
  const dropdown = document.getElementById("adminDropdown");
      dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
}

function logout() {
    window.location.href = "login.html";
}

window.onclick = function(e) {
  if (!e.target.closest('.admin')) {
    document.getElementById("adminDropdown").style.display = "none";
  }
}
function addToCart(item){
  cart.push(item);
  renderCart();
}

function renderCart(){
  const container = document.getElementById("orderItems");
  container.innerHTML = "";

  let total = 0;

  cart.forEach((item, index) => {
    total += item.price;

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <span>${item.name}</span>
      <span>₱${item.price}</span>
      <button onclick="removeItem(${index})">x</button>
    `;

    container.appendChild(div);
  });

  document.getElementById("total").innerText = "Total: ₱" + total;
}

function removeItem(index){
  cart.splice(index, 1);
  renderCart();
}

/******************************** MENU ********************************/

const menu = {
  rice: [
    {name:"Kimchi Fried Rice (Solo)", price:95},
    {name:"Kimchi Fried Rice (Double)", price:130},
    {name:"Shitake Fried Rice", price:95},
    {name:"Spam Fried Rice", price:95},
    {name:"Seafood Fried Rice", price:95},
    {name:"Adobo Fried Rice", price:95},
    {name:"Delimondo Fried Rice", price:95},
    {name:"Sisig Fried Rice", price:95}
  ],
  sizzling: [
    {name:"Hungarian Sausage", price:99},
    {name:"Spam", price:99},
    {name:"Fried Chicken", price:149},
    {name:"Porkchop", price:149},
    {name:"Sisig", price:139}
  ],
  noodles: [
    {name:"CSN w/ Nori", price:129},
    {name:"CSN w/ Egg + Nori", price:139},
    {name:"CSN w/ Spam", price:159},
    {name:"CSN w/ Sausage", price:169},
    {name:"CSN w/ Chicken Katsu", price:179}
  ],
  snacks: [
    {name:"Hungarian Sandwich", price:75},
    {name:"Extreme Hungarian Sandwich", price:99},
    {name:"Regular Fries", price:55},
    {name:"Overload Nachos", price:110},
    {name:"Cheesy Bacon Fries", price:110},
    {name:"Muffins", price:75}
  ],
  coffee: [
    {name:"Americano", price:99},
    {name:"Cafe Latte", price:115},
    {name:"Caramel Latte", price:115},
    {name:"Vanilla Latte", price:115},
    {name:"Hazelnut Latte", price:115},
    {name:"White Mocha", price:115}
  ],
  noncoffee: [
    {name:"Milky Chocolate", price:115},
    {name:"Milky Oreo", price:115},
    {name:"Strawberry Milk", price:115}
  ],
  matcha: [
    {name:"Matcha Latte", price:145},
    {name:"Oreo Matcha", price:145},
    {name:"Strawberry Matcha", price:145},
    {name:"Biscoff Matcha", price:145},
    {name:"Classic Matcha Latte", price:170},
    {name:"Agave Oat Matcha", price:180},
    {name:"Berry Matcha", price:180}
  ]
};

let cart = [];
let editMode = false;
let currentCategory = "rice";

/******************************** CATEGORY SELECT ********************************/
function setActive(btn, cat){
  document.querySelectorAll(".categories button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  currentCategory = cat;
  renderCurrentCategory();
}
/******************************** EDIT MODE ********************************/
document.getElementById("editMenuBtn").onclick = function(){
  editMode = !editMode;

  this.innerText = editMode ? "💾 Save Changes" : "✏️ Edit Menu";

  // 🔥 THIS IS THE MISSING PART
  this.classList.toggle("save-mode", editMode);

  renderCurrentCategory();
};
/******************************** MAIN RENDER ********************************/
function renderCurrentCategory(){
  const container = document.getElementById("products");
  container.innerHTML = "";

  menu[currentCategory].forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="IMAGES/foodpic.jpg" alt="food">
      <h4>${item.name}</h4>
      <p>₱${item.price}</p>

      ${editMode ? `<button class="delete-btn">🗑 Delete</button>` : ""}
    `;

    // NORMAL MODE (add to cart)
    if(!editMode){
      div.onclick = () => addToCart(item);
    }

    // ✏️ EDIT MODE (CLICK CARD TO EDIT)
    if(editMode){
      div.onclick = () => {
        const newName = prompt("Edit product name:", item.name);
        const newPrice = parseFloat(prompt("Edit price:", item.price));

        if(newName && !isNaN(newPrice)){
          menu[currentCategory][index].name = newName;
          menu[currentCategory][index].price = newPrice;
          renderCurrentCategory();
        }
      };

      // DELETE BUTTON
      div.querySelector(".delete-btn").onclick = (e) => {
        e.stopPropagation();
        menu[currentCategory].splice(index, 1);
        renderCurrentCategory();
      };
    }

    container.appendChild(div);
  });

  // ➕ ADD PRODUCT BUTTON
  if(editMode){
    const addBtn = document.createElement("button");
    addBtn.innerText = "+ Add Product";
    addBtn.className = "action";
    addBtn.style.marginTop = "10px";

    addBtn.onclick = addProduct;

    container.appendChild(addBtn);
  }
}
/******************************** ADD PRODUCT ********************************/
function addProduct(){
  const name = prompt("Enter product name:");
  const price = parseFloat(prompt("Enter price:"));

  if(!name || isNaN(price)) return;

  menu[currentCategory].push({
    name: name,
    price: price
  });

  renderCurrentCategory();
}

/******************************** DEFAULT LOAD ********************************/
currentCategory = "rice";
renderCurrentCategory();

/******************************** PAYMENT MODAL ********************************/
const modal = document.getElementById("paymentModal");

document.getElementById("placeOrderBtn").addEventListener("click", () => {

  if(cart.length === 0){
    alert("No items in cart!");
    return;
  }

  openModal();
});

function openModal(){
  modal.style.display = "flex";

  const container = document.getElementById("modalOrderItems");
  container.innerHTML = "";

  let subtotal = 0;

  cart.forEach(item => {
    subtotal += item.price;

    container.innerHTML += `
      <div style="display:flex; justify-content:space-between;">
        <span>${item.name}</span>
        <span>₱${item.price}</span>
      </div>
    `;
  });

  document.getElementById("subtotalText").innerText = "Subtotal: ₱" + subtotal;
  document.getElementById("totalText").innerText = "Total: ₱" + subtotal;

  updateTotals();
}

function closeModal(){
  modal.style.display = "none";
}


/******************************** DISCOUNT / TOTAL LOGIC **************************/
document.getElementById("discountType").addEventListener("change", updateTotals);
document.getElementById("customDiscount").addEventListener("input", updateTotals);

function updateTotals(){
  let subtotal = 0;
  cart.forEach(item => subtotal += item.price);

  let discount = parseFloat(document.getElementById("discountType").value);
  let custom = parseFloat(document.getElementById("customDiscount").value) || 0;

  let finalDiscount = discount > 0 ? discount : custom;

  let total = subtotal - (subtotal * finalDiscount / 100);

  document.getElementById("totalText").innerText = "Total: ₱" + total.toFixed(2);

}

/******************************** AMOUNT INPUT ********************************/
document.getElementById("amountInput").addEventListener("input", () => {
  computeChange();
});

function computeChange(){
  let totalText = document.getElementById("totalText").innerText;
  let total = parseFloat(totalText.replace("Total: ₱", "")) || 0;

  let amount = parseFloat(document.getElementById("amountInput").value);

  // 👉 HINDI mag show agad kung empty
  if(!amount || amount <= 0){
    document.getElementById("changeText").innerText = "Change: ₱0";
    return;
  }

  let change = amount - total;

  document.getElementById("changeText").innerText =
    "Change: ₱" + change.toFixed(2);
}

/******************************** CONFIRM PAYMENT ********************************/
function confirmPayment(){
  const method = document.getElementById("paymentMethod").value;

  if(method === ""){
    alert("Select payment method!");
    return;
  }

  if(method === "GCash"){
    alert("Redirect to GCash QR / Payment (Simulation only)");
  }

  alert("Payment Successful!");

  cart = [];
  renderCart();
  closeModal();
}

/******************************** PAYMENT METHOD : CASH OR GCASH ********************************/
function handlePaymentMethod(){
  const method = document.getElementById("paymentMethod").value;

  document.getElementById("gcashBox").style.display = "none";
  document.getElementById("cashBox").style.display = "none";

  if(method === "GCash"){
    document.getElementById("gcashBox").style.display = "block";
  }

  if(method === "Cash"){
    document.getElementById("cashBox").style.display = "block";
  }
}
