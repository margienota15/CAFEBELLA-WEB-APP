<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cafe Bella POS</title>

<link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Domine', serif;
}
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }

/******************************** SIDEBAR ********************************/
.sidebar {
  width: 270px;
  height: 100vh;
  background: 
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url('IMAGES/webapppic.jpg'); 
  background-size: cover;      
  background-position: center;   
  background-repeat: no-repeat;
  display: flex;
  flex-direction: column;
  color: white;
  padding: 20px;
  position: fixed;
  left: 0;
  top: 0;
  transition: transform 0.3s ease;
  z-index: 100;
}
.sidebar.hide {
  transform: translateX(-100%);
}
.sidebar-overlay {
  position: absolute;
  top: 150px;  
  left: 15px;
  right: 15px;
  bottom: 85px;
  background: rgba(201, 247, 255, 0.5);
  z-index: 0;
}

/******************************** MENU BUTTON ********************************/
.menu {
  position: relative;
  margin-top: 20px;
  padding-bottom: 15px;
  border-bottom: 2px solid white;
  z-index: 1;
}
.menu button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.8);
  cursor: pointer;
  text-align: left;
  font-weight: bold;
  font-size: 15px;      
  font-weight: 600;      
  letter-spacing: 0.3px; 
  color: #2b2b2b;       
  padding-left: 40px; 
  display: flex;
  align-items: center;
  gap: 10px;
  line-height: 1;
  transition: all 0.3s ease;
}
.menu button.active {
  background: #2e7d32;
  color: white;
}
.menu button.active img.icon {
  filter: brightness(0) invert(1); 
}
.menu button:hover {
  background: #2e7d32; 
  color: white;
}
.menu button:hover img.icon {
  filter: brightness(0) invert(1);
}
.menu button img.icon {
  width: 25px;
  height: 25px;
  object-fit: contain;
  display: block; 
}
#menu-btn {
  font-size: 22px;
  background: #114500;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-right: 15px;
}

/*********************************** MAIN ********************************/
.main {
  flex: 1;
  margin-left: 270px;
  transition: margin-left 0.3s ease;

  display: flex;
  flex-direction: column;
}
.main.full {
  margin-left: 0;
}
/******************************** TOP BAR ********************************/
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #e9e9e9;
  padding: 15px 25px;
}
.left-section {
  display: flex;
  align-items: center;
  gap: 15px;
}
/******************************** SEARCH BAR ********************************/
.search-container {
  display: flex;
  align-items: center;
  background: #dcdcdc;
  padding: 8px 15px;
  border-radius: 25px;
  width: 350px;
}
.search-container span {
  margin-right: 10px;
  font-size: 16px;
}
.search-container input {
  border: none;
  background: transparent;
  outline: none;
  width: 100%;
}


/******************************** ADMIN ********************************/
.admin {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  position: relative;
  background: white;
  padding: 8px 15px;
  border-radius: 50px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}
.admin:hover {
  background: #f1f1f1;
}
.admin img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid #2e7d32;
  object-fit: cover;
}
.admin-info {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}
.admin-name {
  font-size: 14px;
  font-weight: 600;
  color: #1b5e20;
}
.admin-role {
  font-size: 11px;
  color: gray;
}
.arrow {
  font-size: 12px;
  color: #555;
}
.dropdown {
  display: none;
  position: absolute;
  top: 55px;
  right: 0;
  background: white;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  overflow: hidden;
  z-index: 100;
}
.dropdown button {
  width: 160px;
  padding: 12px;
  border: none;
  background: white;
  text-align: left;
  cursor: pointer;
  font-size: 14px;
}
.dropdown button:hover {
  background: #2e7d32;
  color: white;
}
.admin-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-bottom: 10px;      
  border-bottom: 2px solid white; 
  margin-top: 60px;
}
.admin-header h2 {
  margin: 0; 
  font-size: 22px;
}
.admin-header img {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #2e7d32;
}

/******************************** NAVBAR ********************************/
.title-container {
  padding: 20px 30px;
}
.title-container h1 {
  font-size: 28px;
  margin-bottom: 10px;
  color: #114500;
}
.title-container p {
  font-size: 16px;
  color: #555;
}
.content-wrapper {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden; 
}

/******************************** CATEGORIES ********************************/
.categories {
  display: flex;
  gap: 10px;
  padding: 10px;
  flex-wrap: wrap;
}

.categories button {
  padding: 8px 15px;
  border: none;
  background: #ddd;
  cursor: pointer;
  border-radius: 6px;
}

.categories button.active {
  background: #114500;
  color: white;
}

/******************************** CONTENT ********************************/
.content {
  display: flex;
  flex: 1;
}

/******************************** PRODUCTS ********************************/
.products {
  flex: 2;
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  overflow-y: auto;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
  text-align: center;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 10px;
}

.card h4 {
  font-size: 14px;
  margin-bottom: 5px;
}

.card p {
  color: #114500;
  font-weight: bold;
}

/******************************** ORDER PANEL ********************************/
.order {
  width: 350px;
  background: white;
  padding: 15px;
  border-left: 1px solid #ddd;
  display: flex;
  flex-direction: column;
}

.order-items {
  flex: 1;
  overflow-y: auto;
  margin-top: 10px;
}

.item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
  font-size: 14px;
}

.total {
  margin-top: 10px;
  font-weight: bold;
  font-size: 18px;
}

button.action {
  margin-top: 10px;
  padding: 12px;
  border: none;
  color: white;
  background: #114500;
  cursor: pointer;
  border-radius: 6px;
}
</style>
</head>

<body>

<!--------------------------------------- SIDEBAR ---------------------------------------------> 
<div class="sidebar">
  <div class="admin-header">
    <img src="IMAGES/cafebella.jpg" alt="Logo">
    <h2>Hello, Admin!</h2>
  </div>

  <div class="sidebar-overlay"></div>

<!--------------------------------------- MENU SIDEBAR ---------------------------------------------> 
<div class="menu">
  <button data-page="Dashboard.html"><img src="IMAGES/dashboardpic.png" class="icon">Dashboard</button>
  <button data-page="POS.html"><img src="IMAGES/POSicon.png" class="icon">POS</button>
  <button data-page="Bookingrequest.html"><img src="IMAGES/Bookingicon.png" class="icon">Receive Booking Request</button>
  <button data-page="Eventmanagement.html"><img src="IMAGES/eventmanagementicon.png" class="icon">Event Management</button>
  <button data-page="Inventory.html"><img src="IMAGES/inventoryicon.png" class="icon">Inventory</button>
  <button data-page="Feedback.html"><img src="IMAGES/feedbackicon.png" class="icon">Customer Feedback</button>
  <button data-page="Calendar.html"><img src="IMAGES/calendaricon.png" class="icon">Calendar</button>
  <button data-page="Settings.html"><img src="IMAGES/settingsicon.png" class="icon">Settings</button>
</div>
</div>

<!--------------------------------------- MAIN ---------------------------------------------> 
<div class="main">

  <!--------------------------------------- TOPBAR ---------------------------------------------> 
  <div class="topbar">
    <div class="left-section">
      <button id="menu-btn">☰</button>
      <div class="search-container">
        <span>🔍</span>
        <input type="text" placeholder="Search ...">
      </div>
    </div>

    <div class="admin" onclick="toggleDropdown()">
      <img src="IMAGES/cafebella.jpg" alt="Admin">
      <div class="admin-info">
        <span class="admin-name">Admin</span>
        <span class="admin-role">Administrator</span>
      </div>
      <span class="arrow">▼</span>
      <div id="adminDropdown" class="dropdown">
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

<div class="content-wrapper">
<!--------------------------------------- TITLE ---------------------------------------------> 
  <div class="title-container">
    <h1>POS / Cashier</h1>
    <p>Handle your daily transactions and payment</p>
  </div>

<!--------------------------------------- CATEGORIES ---------------------------------------------> 
  <div class="categories">
    <button onclick="setActive(this); showCategory('rice')" class="active">Fried Rice</button>
    <button onclick="setActive(this); showCategory('sizzling')">Sizzling</button>
    <button onclick="setActive(this); showCategory('noodles')">Noodles</button>
    <button onclick="setActive(this); showCategory('snacks')">Snacks</button>
    <button onclick="setActive(this); showCategory('coffee')">Coffee</button>
    <button onclick="setActive(this); showCategory('noncoffee')">Non-Coffee</button>
    <button onclick="setActive(this); showCategory('matcha')">Matcha</button>
  </div>

  <div class="content">

<!--------------------------------------- PRODUCTS ---------------------------------------------> 
    <div class="products" id="products"></div>

<!--------------------------------------- ORDER PANEL ---------------------------------------------> 
    <div class="order">
      <h3>Order Summary</h3>
      <div class="order-items" id="orderItems"></div>
      <div class="total" id="total">Total: ₱0</div>
      <button class="action">Proceed</button>
    </div>

  </div>
</div>

<script>
/******************************** Sidebar : BUTTON PAGE ********************************/
function goToDashboard() {
  window.location.href = "Dashboard.html";
}
function goToPOS() {
  window.location.href = "POS.html";
}
function goToBooking() {
  window.location.href = "Bookingrequest.html";
}
function goToEventManagement() {
  window.location.href = "Eventmanagement.html";
}

/******************************** MENU BUTTON ********************************/
  const sidebarButtons = document.querySelectorAll('.sidebar .menu button');

/******************************** GET THE CURRENT PAGE ********************************/
  function getCurrentPage() {
    return window.location.pathname.split("/").pop(); 
  }

/******************************** HIGHLIGHT THE BUTTON OF THE CURRENT PAGE ********************************/
  function highlightSidebar() {
    const currentPage = getCurrentPage().toLowerCase();
    sidebarButtons.forEach(btn => {
      btn.classList.remove('active');
      if (btn.dataset.page.toLowerCase() === currentPage) {
        btn.classList.add('active');
      }
    });
  }

/******************************** BUTTON HIGHLIGHT ********************************/
  highlightSidebar();

/******************************** NAVIGATE WHEN CLICKED ********************************/
  sidebarButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const targetPage = btn.dataset.page;

      sidebarButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

/******************************** NAVIGATE THE TARGET PAGE ********************************/
      window.location.href = targetPage;
    });
  });

/******************************** UPDATE THE HIGHLIGHT ON THE BROWSER ********************************/
  window.addEventListener('popstate', () => {
    highlightSidebar();
  });

/******************************** ADMIN DROPDOWN ********************************/
function toggleDropdown() {
  const dropdown = document.getElementById("adminDropdown");
  dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
}
function logout() {
  window.location.href = "login.html";
}

window.onclick = function(e) {
  if (!e.target.closest('.admin')) {
    document.getElementById("adminDropdown").style.display = "none";
  }
}

/******************************** SIDEBAR TOGGLE ********************************/
const menuBtn = document.getElementById("menu-btn");
const sidebar = document.querySelector(".sidebar");
const main = document.querySelector(".main");

menuBtn.onclick = function() {
  sidebar.classList.toggle("hide");
  main.classList.toggle("full");
};
  
/******************************** MENU ********************************/
const menu = {
  rice: [
    {name:"Kimchi Fried Rice (Solo)", price:95},
    {name:"Kimchi Fried Rice (Double)", price:130},
    {name:"Shitake Fried Rice", price:95},
    {name:"Spam Fried Rice", price:95},
    {name:"Seafood Fried Rice", price:95},
    {name:"Adobo Fried Rice", price:95},
    {name:"Delimondo Fried Rice", price:95},
    {name:"Sisig Fried Rice", price:95}
  ],
  sizzling: [
    {name:"Hungarian Sausage", price:99},
    {name:"Spam", price:99},
    {name:"Fried Chicken", price:149},
    {name:"Porkchop", price:149},
    {name:"Sisig", price:139}
  ],
  noodles: [
    {name:"CSN w/ Nori", price:129},
    {name:"CSN w/ Egg + Nori", price:139},
    {name:"CSN w/ Spam", price:159},
    {name:"CSN w/ Sausage", price:169},
    {name:"CSN w/ Chicken Katsu", price:179}
  ],
  snacks: [
    {name:"Hungarian Sandwich", price:75},
    {name:"Extreme Hungarian Sandwich", price:99},
    {name:"Regular Fries", price:55},
    {name:"Overload Nachos", price:110},
    {name:"Cheesy Bacon Fries", price:110},
    {name:"Muffins", price:75}
  ],
  coffee: [
    {name:"Americano", price:99},
    {name:"Cafe Latte", price:115},
    {name:"Caramel Latte", price:115},
    {name:"Vanilla Latte", price:115},
    {name:"Hazelnut Latte", price:115},
    {name:"White Mocha", price:115}
  ],
  noncoffee: [
    {name:"Milky Chocolate", price:115},
    {name:"Milky Oreo", price:115},
    {name:"Strawberry Milk", price:115}
  ],
  matcha: [
    {name:"Matcha Latte", price:145},
    {name:"Oreo Matcha", price:145},
    {name:"Strawberry Matcha", price:145},
    {name:"Biscoff Matcha", price:145},
    {name:"Classic Matcha Latte", price:170},
    {name:"Agave Oat Matcha", price:180},
    {name:"Berry Matcha", price:180}
  ]
};

let cart = [];

function setActive(btn){
  document.querySelectorAll(".categories button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

function showCategory(cat){
  const container = document.getElementById("products");
  container.innerHTML = "";

  menu[cat].forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="IMAGES/foodpic.jpg" alt="food">
      <h4>${item.name}</h4>
      <p>₱${item.price}</p>
    `;

    div.onclick = () => addToCart(item);
    container.appendChild(div);
  });
}

function addToCart(item){
  cart.push(item);
  renderCart();
}

function renderCart(){
  const container = document.getElementById("orderItems");
  container.innerHTML = "";

  let total = 0;

  cart.forEach(i => {
    total += i.price;

    container.innerHTML += `
      <div class="item">
        <span>${i.name}</span>
        <span>₱${i.price}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = "Total: ₱" + total;
}

// DEFAULT LOAD
showCategory('rice');
</script>

</body>
</html>
